<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-page">

    <!-- Animated background snake dots -->
    <div class="bg-dots" id="bgDots"></div>

    <div class="login-card">
      <div class="login-logo">🐍</div>
      <h1 class="login-title">Snake</h1>
      <p class="login-sub">Enter your name to play</p>

      <div class="login-form">
        <div class="input-group">
          <label for="username">Player Name</label>
          <input
            type="text"
            id="username"
            placeholder="e.g. SnakeMaster99"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="input-error" id="nameError"></span>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="password"
              placeholder="Min. 4 characters"
              maxlength="32"
              autocomplete="off"
            />
            <button class="pw-toggle" id="pwToggle" type="button" aria-label="Show password">👁</button>
          </div>
          <span class="input-error" id="pwError"></span>
        </div>

        <button class="login-btn" id="loginBtn">Play Now →</button>

        <p class="login-hint">
          No account needed — any name &amp; password works.<br>
          Your best score is saved locally.
        </p>
      </div>
    </div>
  </div>

  <script>
    // ── Animated BG dots ──────────────────────────────────────
    const container = document.getElementById('bgDots');
    for (let i = 0; i < 40; i++) {
      const d = document.createElement('div');
      d.className = 'bg-dot';
      d.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        width:${6 + Math.random()*10}px;
        height:${6 + Math.random()*10}px;
        opacity:${0.04 + Math.random()*0.08};
        animation-delay:${Math.random()*6}s;
        animation-duration:${4 + Math.random()*4}s;
      `;
      container.appendChild(d);
    }

    // ── Form logic ────────────────────────────────────────────
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const nameErr    = document.getElementById('nameError');
    const pwErr      = document.getElementById('pwError');
    const loginBtn   = document.getElementById('loginBtn');
    const pwToggle   = document.getElementById('pwToggle');

    // Show/hide password
    pwToggle.addEventListener('click', () => {
      const show = passwordEl.type === 'password';
      passwordEl.type = show ? 'text' : 'password';
      pwToggle.textContent = show ? '🙈' : '👁';
    });

    // Clear errors on type
    usernameEl.addEventListener('input', () => nameErr.textContent = '');
    passwordEl.addEventListener('input', () => pwErr.textContent = '');

    // Enter key support
    [usernameEl, passwordEl].forEach(el =>
      el.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); })
    );

    loginBtn.addEventListener('click', attempt);

    function attempt() {
      const name = usernameEl.value.trim();
      const pw   = passwordEl.value;
      let ok = true;

      if (name.length < 2) {
        nameErr.textContent = 'Name must be at least 2 characters.';
        usernameEl.focus();
        ok = false;
      }
      if (pw.length < 4) {
        pwErr.textContent = 'Password must be at least 4 characters.';
        if (ok) passwordEl.focus();
        ok = false;
      }

      if (!ok) {
        loginBtn.classList.add('shake');
        setTimeout(() => loginBtn.classList.remove('shake'), 400);
        return;
      }

      // Save player name, redirect to game
      localStorage.setItem('snakePlayer', name);
      loginBtn.textContent = 'Loading…';
      loginBtn.disabled = true;
      setTimeout(() => { window.location.href = 'index.html'; }, 300);
    }

    // If already logged in, skip straight to game
    if (localStorage.getItem('snakePlayer')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
